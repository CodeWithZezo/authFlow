Unauthorized:
  description: Missing or invalid access token cookie
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yml#/Error'
      example:
        message: "Unauthorized"

Forbidden:
  description: Authenticated but insufficient role for this operation
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yml#/Error'
      example:
        message: "Forbidden"

NotFound:
  description: The requested resource does not exist
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yml#/Error'
      example:
        message: "Resource not found"

Conflict:
  description: Duplicate resource — unique constraint violated (email, slug, membership, etc.)
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yml#/Error'
      example:
        message: "Resource already exists"

InternalError:
  description: Unexpected server error
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yml#/Error'
      example:
        message: "Internal server error"
