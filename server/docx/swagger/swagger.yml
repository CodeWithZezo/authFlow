openapi: 3.0.3

info:
  title: AuthCore API
  version: 1.0.0
  description: |
    Multi-tenant authentication and user management API.

    **Base URL:** `http://localhost:5000/api/v1`

    ## Authentication
    All protected endpoints require an `accessToken` HTTP-only cookie set by `/auth/login` or `/auth/signup`.
    Use `/auth/refresh-token` to renew an expired access token using the `refreshToken` cookie.

    ## Role-Based Access Control
    Two separate role hierarchies are enforced by the `roleAuthorize` middleware:

    **Organization roles** (highest → lowest): `owner` → `admin` → `member`

    **Project roles** (highest → lowest): `manager` → `contributor` → `viewer`

    Specifying a minimum role grants access to all higher roles too.

    ## Resource Creation Order
    Some resources have hard dependencies — create in this order:
    1. User (signup)
    2. Organization
    3. Project
    4. Password Policy
    5. Project Policy

    Delete in reverse order. Project Policy must be deleted before Password Policy.

  contact:
    name: AuthCore
  license:
    name: MIT

servers:
  - url: http://localhost:5000/api/v1
    description: Local development server
  - url: https://api.yourdomain.com/api/v1
    description: Production server

tags:
  - name: Auth
    description: Signup, login, token refresh, logout, change password
  - name: Organizations
    description: Organization CRUD
  - name: Organization Members
    description: Manage members within an organization
  - name: Projects
    description: Project CRUD (nested under organizations)
  - name: Project Members
    description: Manage members within a project
  - name: Project Policy
    description: Per-project authentication and access control policy
  - name: Password Policy
    description: Per-project password strength requirements
  - name: Sessions
    description: View and revoke active login sessions

security:
  - cookieAuth: []

# ─── Security schemes ────────────────────────────────────────────────────────
components:
  securitySchemes:
    $ref: './security/cookieAuth.yml'

  # ── Schemas ─────────────────────────────────────────────────────────────────
  schemas:
    ObjectId:
      $ref: './schemas/primitives.yml#/ObjectId'
    OrgRole:
      $ref: './schemas/primitives.yml#/OrgRole'
    ProjectRole:
      $ref: './schemas/primitives.yml#/ProjectRole'
    MemberStatus:
      $ref: './schemas/primitives.yml#/MemberStatus'
    ProjectStatus:
      $ref: './schemas/primitives.yml#/ProjectStatus'
    AuthType:
      $ref: './schemas/primitives.yml#/AuthType'
    AuthMethod:
      $ref: './schemas/primitives.yml#/AuthMethod'
    AuthUser:
      $ref: './schemas/user.yml#/AuthUser'
    User:
      $ref: './schemas/user.yml#/User'
    PopulatedUser:
      $ref: './schemas/user.yml#/PopulatedUser'
    Organization:
      $ref: './schemas/org.yml#/Organization'
    OrganizationMembership:
      $ref: './schemas/org.yml#/OrganizationMembership'
    Project:
      $ref: './schemas/project.yml#/Project'
    ProjectMembership:
      $ref: './schemas/project.yml#/ProjectMembership'
    ProjectPolicy:
      $ref: './schemas/policy.yml#/ProjectPolicy'
    PasswordPolicy:
      $ref: './schemas/policy.yml#/PasswordPolicy'
    Session:
      $ref: './schemas/session.yml#/Session'
    Error:
      $ref: './schemas/error.yml#/Error'
    ValidationError:
      $ref: './schemas/error.yml#/ValidationError'

  # ── Parameters ──────────────────────────────────────────────────────────────
  parameters:
    orgId:
      $ref: './parameters/path.yml#/orgId'
    projectId:
      $ref: './parameters/path.yml#/projectId'
    userId:
      $ref: './parameters/path.yml#/userId'
    sessionId:
      $ref: './parameters/path.yml#/sessionId'

  # ── Responses ───────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      $ref: './responses/errors.yml#/Unauthorized'
    Forbidden:
      $ref: './responses/errors.yml#/Forbidden'
    NotFound:
      $ref: './responses/errors.yml#/NotFound'
    Conflict:
      $ref: './responses/errors.yml#/Conflict'
    InternalError:
      $ref: './responses/errors.yml#/InternalError'

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:
  # Auth
  /auth/signup:
    $ref: './paths/auth.yml#/paths/~1auth~1signup'
  /auth/login:
    $ref: './paths/auth.yml#/paths/~1auth~1login'
  /auth/me:
    $ref: './paths/auth.yml#/paths/~1auth~1me'
  /auth/refresh-token:
    $ref: './paths/auth.yml#/paths/~1auth~1refresh-token'
  /auth/change-password:
    $ref: './paths/auth.yml#/paths/~1auth~1change-password'
  /auth/logout:
    $ref: './paths/auth.yml#/paths/~1auth~1logout'

  # Organizations
  /organizations:
    $ref: './paths/orgs.yml#/paths/~1organizations'
  /organizations/{orgId}:
    $ref: './paths/orgs.yml#/paths/~1organizations~1{orgId}'
  /organizations/{orgId}/members:
    $ref: './paths/orgs.yml#/paths/~1organizations~1{orgId}~1members'
  /organizations/{orgId}/members/{userId}:
    $ref: './paths/orgs.yml#/paths/~1organizations~1{orgId}~1members~1{userId}'

  # Projects
  /organizations/{orgId}/projects:
    $ref: './paths/projects.yml#/paths/~1organizations~1{orgId}~1projects'
  /organizations/{orgId}/projects/{projectId}:
    $ref: './paths/projects.yml#/paths/~1organizations~1{orgId}~1projects~1{projectId}'
  /organizations/{orgId}/projects/{projectId}/members:
    $ref: './paths/projects.yml#/paths/~1organizations~1{orgId}~1projects~1{projectId}~1members'
  /organizations/{orgId}/projects/{projectId}/members/{userId}:
    $ref: './paths/projects.yml#/paths/~1organizations~1{orgId}~1projects~1{projectId}~1members~1{userId}'

  # Policies
  /projects/{projectId}/policy:
    $ref: './paths/policy.yml#/paths/~1projects~1{projectId}~1policy'
  /projects/{projectId}/password-policy:
    $ref: './paths/policy.yml#/paths/~1projects~1{projectId}~1password-policy'

  # Sessions
  /sessions:
    $ref: './paths/sessions.yml#/paths/~1sessions'
  /sessions/{sessionId}:
    $ref: './paths/sessions.yml#/paths/~1sessions~1{sessionId}'
