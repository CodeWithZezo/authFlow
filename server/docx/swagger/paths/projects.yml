paths:
  /organizations/{orgId}/projects:
    parameters:
      - $ref: '../parameters/path.yml#/orgId'

    post:
      tags: [Projects]
      summary: Create a project
      description: |
        Creates a new project inside the organization.
        The authenticated user is automatically assigned as `manager` of the new project.
        Requires `admin` org role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "My App"
                description:
                  type: string
                  nullable: true
                  example: "Customer-facing web application"
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project created successfully"
                  project:
                    $ref: '../schemas/project.yml#/Project'
        '400':
          description: Project name is required
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Project name is required"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
        '409':
          description: Project name already exists in this organization
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Project name already exists in this organization"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    get:
      tags: [Projects]
      summary: List all projects in an organization
      description: Returns all projects for the organization. Requires `member` org role.
      responses:
        '200':
          description: Projects list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Projects fetched successfully"
                  projects:
                    type: array
                    items:
                      $ref: '../schemas/project.yml#/Project'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /organizations/{orgId}/projects/{projectId}:
    parameters:
      - $ref: '../parameters/path.yml#/orgId'
      - $ref: '../parameters/path.yml#/projectId'

    get:
      tags: [Projects]
      summary: Get a project by ID
      description: Returns a single project. Requires `member` org role.
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project fetched successfully"
                  project:
                    $ref: '../schemas/project.yml#/Project'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    patch:
      tags: [Projects]
      summary: Update a project
      description: Update name, description, or status. Requires `admin` org role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "My App v2"
                description:
                  type: string
                  nullable: true
                  example: "Updated description"
                status:
                  type: string
                  enum: [active, inactive, pending, suspended]
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project updated successfully"
                  project:
                    $ref: '../schemas/project.yml#/Project'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '409':
          $ref: '../responses/errors.yml#/Conflict'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    delete:
      tags: [Projects]
      summary: Delete a project
      description: |
        Permanently deletes the project and all its memberships. Requires `owner` org role.
        Delete Project Policy and Password Policy before deleting the project.
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project deleted successfully"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /organizations/{orgId}/projects/{projectId}/members:
    parameters:
      - $ref: '../parameters/path.yml#/orgId'
      - $ref: '../parameters/path.yml#/projectId'

    post:
      tags: [Project Members]
      summary: Add a member to the project
      description: Adds an existing user to the project with the given role. Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId:
                  type: string
                  pattern: '^[a-f\d]{24}$'
                  example: "64f1a2b3c4d5e6f7a8b9c0d1"
                role:
                  type: string
                  enum: [manager, contributor, viewer]
      responses:
        '201':
          description: Member added to project
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Member added to project successfully"
                  membership:
                    $ref: '../schemas/project.yml#/ProjectMembership'
        '400':
          description: userId and role are required
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "userId and role are required"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
        '409':
          description: User is already a member of this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "User is already a member of this project"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    get:
      tags: [Project Members]
      summary: List all project members
      description: |
        Returns all project memberships with userId populated (fullName, email, phone, isVerified).
        Requires `viewer` project role or higher.
      responses:
        '200':
          description: Project members list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project members fetched successfully"
                  members:
                    type: array
                    items:
                      $ref: '../schemas/project.yml#/ProjectMembership'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /organizations/{orgId}/projects/{projectId}/members/{userId}:
    parameters:
      - $ref: '../parameters/path.yml#/orgId'
      - $ref: '../parameters/path.yml#/projectId'
      - $ref: '../parameters/path.yml#/userId'

    get:
      tags: [Project Members]
      summary: Get a specific project member
      description: Returns a single project membership with populated user. Requires `viewer` project role.
      responses:
        '200':
          description: Project member details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project member fetched successfully"
                  membership:
                    $ref: '../schemas/project.yml#/ProjectMembership'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Member not found in this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Member not found in this project"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    patch:
      tags: [Project Members]
      summary: Update project member role or status
      description: At least one of `role` or `status` must be provided. Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [manager, contributor, viewer]
                status:
                  type: string
                  enum: [active, inactive, pending, suspended]
      responses:
        '200':
          description: Project member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project member updated successfully"
                  membership:
                    $ref: '../schemas/project.yml#/ProjectMembership'
        '400':
          description: At least one of role or status is required
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "At least one of role or status is required"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    delete:
      tags: [Project Members]
      summary: Remove a member from the project
      description: Removes the project membership. Requires `manager` project role.
      responses:
        '200':
          description: Member removed from project
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Member removed from project successfully"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Member not found in this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Member not found in this project"
        '500':
          $ref: '../responses/errors.yml#/InternalError'
