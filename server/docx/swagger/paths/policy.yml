paths:
  /projects/{projectId}/policy:
    parameters:
      - $ref: '../parameters/path.yml#/projectId'

    post:
      tags: [Project Policy]
      summary: Create project policy
      description: |
        Creates the authentication and access policy for a project.

        **Prerequisite:** A Password Policy must exist for this project before calling this endpoint.

        One policy per project — use `PATCH` to update an existing policy.
        Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authRequired:
                  type: boolean
                  default: true
                  example: true
                phoneRequired:
                  type: boolean
                  default: false
                  example: false
                authType:
                  type: string
                  enum: [password, oauth, two_factor]
                  default: password
                authMethods:
                  type: array
                  items:
                    type: string
                    enum: [email, phone, google, github]
                  example: [email, google]
                roles:
                  type: array
                  items:
                    type: string
                  example: [viewer, contributor]
                statuses:
                  type: array
                  items:
                    type: string
                  example: [active]
      responses:
        '201':
          description: Project policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Project policy created successfully"
                  policy:
                    $ref: '../schemas/policy.yml#/ProjectPolicy'
        '400':
          description: Password policy must be created first, or no fields provided
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              examples:
                noPwdPolicy:
                  summary: Password policy missing
                  value:
                    message: "Password policy must be created before creating a project policy"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Project not found"
        '409':
          description: Policy already exists for this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Policy already exists for this project. Use PATCH to update."
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    get:
      tags: [Project Policy]
      summary: Get project policy
      description: |
        Returns the project policy with `passwordPolicyId` fully populated.
        Requires `viewer` project role or higher.
      responses:
        '200':
          description: Project policy details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Policy fetched successfully"
                  policy:
                    $ref: '../schemas/policy.yml#/ProjectPolicy'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Policy not found for this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Policy not found for this project"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    patch:
      tags: [Project Policy]
      summary: Update project policy
      description: |
        Update one or more policy fields. At least one field required.
        Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authRequired:
                  type: boolean
                phoneRequired:
                  type: boolean
                authType:
                  type: string
                  enum: [password, oauth, two_factor]
                authMethods:
                  type: array
                  items:
                    type: string
                    enum: [email, phone, google, github]
                roles:
                  type: array
                  items:
                    type: string
                statuses:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Policy updated successfully"
                  policy:
                    $ref: '../schemas/policy.yml#/ProjectPolicy'
        '400':
          description: At least one field is required to update
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "At least one field is required to update"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    delete:
      tags: [Project Policy]
      summary: Delete project policy
      description: |
        Permanently deletes the project policy.
        **Must be deleted before the Password Policy.**
        Requires `manager` project role.
      responses:
        '200':
          description: Policy deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Policy deleted successfully"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /projects/{projectId}/password-policy:
    parameters:
      - $ref: '../parameters/path.yml#/projectId'

    post:
      tags: [Password Policy]
      summary: Create password policy
      description: |
        Creates the password strength requirements for a project.

        **Must be created before Project Policy.**

        One policy per project — use `PATCH` to update.
        Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                minLength:
                  type: integer
                  minimum: 4
                  maximum: 32
                  default: 6
                  example: 8
                requireNumbers:
                  type: boolean
                  default: true
                  example: true
                requireUppercase:
                  type: boolean
                  default: true
                  example: true
                requireSpecialChars:
                  type: boolean
                  default: false
                  example: false
      responses:
        '201':
          description: Password policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password policy created successfully"
                  passwordPolicy:
                    $ref: '../schemas/policy.yml#/PasswordPolicy'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Project not found"
        '409':
          description: Password policy already exists for this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Password policy already exists for this project. Use PATCH to update."
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    get:
      tags: [Password Policy]
      summary: Get password policy
      description: Returns the password policy for the project. Requires `viewer` project role.
      responses:
        '200':
          description: Password policy details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password policy fetched successfully"
                  passwordPolicy:
                    $ref: '../schemas/policy.yml#/PasswordPolicy'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          description: Password policy not found for this project
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Password policy not found for this project"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    patch:
      tags: [Password Policy]
      summary: Update password policy
      description: |
        Update one or more fields. At least one field required.
        `minLength` cannot be less than 4. Requires `manager` project role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                minLength:
                  type: integer
                  minimum: 4
                  maximum: 32
                requireNumbers:
                  type: boolean
                requireUppercase:
                  type: boolean
                requireSpecialChars:
                  type: boolean
      responses:
        '200':
          description: Password policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password policy updated successfully"
                  passwordPolicy:
                    $ref: '../schemas/policy.yml#/PasswordPolicy'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              examples:
                noFields:
                  summary: No fields provided
                  value: { message: "At least one field is required to update" }
                tooShort:
                  summary: minLength below minimum
                  value: { message: "Minimum password length cannot be less than 4" }
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

    delete:
      tags: [Password Policy]
      summary: Delete password policy
      description: |
        Permanently deletes the password policy.
        **Cannot be deleted while a Project Policy still references it.**
        Delete the Project Policy first. Requires `manager` project role.
      responses:
        '200':
          description: Password policy deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password policy deleted successfully"
        '400':
          description: Project Policy still references this password policy
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Cannot delete password policy while a project policy references it. Delete the project policy first."
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '403':
          $ref: '../responses/errors.yml#/Forbidden'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'
