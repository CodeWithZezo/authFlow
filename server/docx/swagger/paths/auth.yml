paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user, hashes the password with bcrypt, creates a Session document,
        and sets `accessToken` (15 min) and `refreshToken` (7 day) HTTP-only cookies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password]
              properties:
                fullName:
                  type: string
                  example: "Jane Doe"
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "Secure1@Pass"
                phone:
                  type: string
                  nullable: true
                  example: "923001234567"
      responses:
        '201':
          description: User created. Auth cookies set automatically.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User created successfully"
                  user:
                    $ref: '../schemas/user.yml#/AuthUser'
                  accessToken:
                    type: string
                    description: Also set as HTTP-only cookie
                  refreshToken:
                    type: string
                    description: Also set as HTTP-only cookie
        '400':
          description: Password fails strength validation
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/ValidationError'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Email already exists"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Validates credentials, creates a new Session document, and sets
        `accessToken` and `refreshToken` HTTP-only cookies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  format: password
                  example: "Secure1@Pass"
      responses:
        '200':
          description: Login successful. Auth cookies set automatically.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User logged in successfully"
                  user:
                    $ref: '../schemas/user.yml#/AuthUser'
                  accessToken:
                    type: string
                    description: Also set as HTTP-only cookie
                  refreshToken:
                    type: string
                    description: Also set as HTTP-only cookie
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Invalid credentials"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "User not found"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      description: |
        Returns the full user document for the currently authenticated user.
        Note: returns `_id` (not `id`) as this is a raw Mongoose document.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User fetched successfully"
                  user:
                    $ref: '../schemas/user.yml#/User'
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Validates the `refreshToken` cookie against the Session collection,
        deletes the old session, creates a new one, and sets fresh auth cookies.
      security: []
      responses:
        '200':
          description: Token refreshed. New auth cookies set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token refreshed successfully"
                  user:
                    $ref: '../schemas/user.yml#/AuthUser'
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Refresh token missing, invalid, expired, or session already revoked
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              examples:
                missing:
                  value: { message: "Refresh token missing" }
                invalid:
                  value: { message: "Invalid or expired refresh token" }
                revoked:
                  value: { message: "Session not found or already revoked" }
        '404':
          $ref: '../responses/errors.yml#/NotFound'
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /auth/change-password:
    patch:
      tags: [Auth]
      summary: Change current user password
      description: Verifies the current password then replaces it with the new one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: "OldPass1@"
                newPassword:
                  type: string
                  format: password
                  example: "NewPass2#"
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: Invalid new password or missing fields
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
        '401':
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: '../schemas/error.yml#/Error'
              example:
                message: "Current password is incorrect"
        '500':
          $ref: '../responses/errors.yml#/InternalError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session
      description: Deletes the current session from MongoDB and clears both auth cookies.
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"
        '401':
          $ref: '../responses/errors.yml#/Unauthorized'
        '500':
          $ref: '../responses/errors.yml#/InternalError'
