orgId:
  name: orgId
  in: path
  required: true
  description: Organization ID (MongoDB ObjectId)
  schema:
    type: string
    pattern: '^[a-f\d]{24}$'
    example: "64f1a2b3c4d5e6f7a8b9c0d1"

