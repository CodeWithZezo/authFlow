Organization:
  type: object
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d1"
    name:
      type: string
      example: "Acme Corp"
    slug:
      type: string
      example: "acme-corp"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

OrganizationMembership:
  type: object
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d2"
    orgId:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d1"
    userId:
      description: Raw ObjectId string, or populated user object when fetched via list/get endpoints
      oneOf:
        - type: string
          pattern: '^[a-f\d]{24}$'
        - $ref: './user.yml#/PopulatedUser'
    role:
      type: string
      enum: [owner, admin, member]
    status:
      type: string
      enum: [active, inactive, pending, suspended]
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
