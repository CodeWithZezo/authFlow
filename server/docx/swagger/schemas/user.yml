AuthUser:
  type: object
  description: Compact user object returned on login, signup, and token refresh
  required: [id, fullName, email]
  properties:
    id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d1"
    fullName:
      type: string
      example: "Jane Doe"
    email:
      type: string
      format: email
      example: "jane@example.com"
    phone:
      type: string
      nullable: true
      example: "923001234567"

User:
  type: object
  description: Full user document returned by GET /auth/me (raw Mongoose doc — uses _id not id)
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d1"
    fullName:
      type: string
      example: "Jane Doe"
    email:
      type: string
      format: email
      example: "jane@example.com"
    phone:
      type: string
      nullable: true
      example: "923001234567"
    isVerified:
      type: boolean
      example: false
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

PopulatedUser:
  type: object
  description: Subset of user fields populated on membership queries
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d1"
    fullName:
      type: string
      example: "Jane Doe"
    email:
      type: string
      format: email
      example: "jane@example.com"
    phone:
      type: string
      nullable: true
    isVerified:
      type: boolean
