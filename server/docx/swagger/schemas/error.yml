Error:
  type: object
  required: [message]
  properties:
    message:
      type: string
      example: "Resource not found"

ValidationError:
  type: object
  required: [message]
  properties:
    message:
      type: string
      example: "Invalid password"
    errors:
      type: array
      items:
        type: string
      example:
        - "Password must be at least 8 characters"
        - "Password must contain a number"
