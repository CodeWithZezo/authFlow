ProjectPolicy:
  type: object
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d5"
    projectId:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d3"
    authRequired:
      type: boolean
      example: true
    phoneRequired:
      type: boolean
      example: false
    authType:
      type: string
      enum: [password, oauth, two_factor]
      example: password
    authMethods:
      type: array
      items:
        type: string
        enum: [email, phone, google, github]
      example: [email, google]
    roles:
      type: array
      items:
        type: string
      example: [viewer, contributor]
    statuses:
      type: array
      items:
        type: string
      example: [active]
    passwordPolicyId:
      description: Raw ObjectId string, or populated PasswordPolicy when fetched via getPolicy
      oneOf:
        - type: string
          pattern: '^[a-f\d]{24}$'
        - $ref: './policy.yml#/PasswordPolicy'
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

PasswordPolicy:
  type: object
  properties:
    _id:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d6"
    projectId:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: "64f1a2b3c4d5e6f7a8b9c0d3"
    minLength:
      type: integer
      minimum: 4
      maximum: 32
      default: 6
      example: 8
    requireNumbers:
      type: boolean
      default: true
      example: true
    requireUppercase:
      type: boolean
      default: true
      example: true
    requireSpecialChars:
      type: boolean
      default: false
      example: false
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
