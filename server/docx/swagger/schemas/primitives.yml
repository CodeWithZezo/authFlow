ObjectId:
  type: string
  pattern: '^[a-f\d]{24}$'
  example: "64f1a2b3c4d5e6f7a8b9c0d1"

OrgRole:
  type: string
  enum: [owner, admin, member]
  description: Organization membership role

ProjectRole:
  type: string
  enum: [manager, contributor, viewer]
  description: Project membership role

MemberStatus:
  type: string
  enum: [active, inactive, pending, suspended]

ProjectStatus:
  type: string
  enum: [active, inactive, pending, suspended]

AuthType:
  type: string
  enum: [password, oauth, two_factor]

AuthMethod:
  type: string
  enum: [email, phone, google, github]
